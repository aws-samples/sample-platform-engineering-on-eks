---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-argo-rollouts
spec:
  goTemplate: true
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
  - clusters:
      values:
        addonChart: argo-rollouts
        addonChartVersion: 2.40.5
        addonChartRepository: https://argoproj.github.io/argo-helm
      selector:
        matchExpressions:
          - key: enable_argo_rollouts
            operator: Exists
  template:
    metadata:
      name: addon-{{.values.addonChart}}-{{.metadata.labels.environment}}
    spec:
      project: default
      sources:
        - repoURL: '{{.metadata.annotations.platform_repo_url}}'
          targetRevision: '{{.metadata.annotations.platform_repo_revision}}'
          ref: values
        - chart: '{{.values.addonChart}}'
          repoURL: '{{.values.addonChartRepository}}'
          targetRevision: '{{.values.addonChartVersion}}'
          helm:
            releaseName: '{{.values.addonChart}}'
            ignoreMissingValueFiles: true
            valueFiles:
              - $values/config/addons/environments/default/{{.values.addonChart}}/values.yaml
              - $values/config/addons/environments/{{.metadata.labels.environment}}/{{.values.addonChart}}/values.yaml
      destination:
        namespace: '{{default "argo-rollouts" .metadata.annotations.argo_rollouts_namespace}}'
        server: '{{ .server }}'
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
            - /spec/preserveUnknownFields
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true