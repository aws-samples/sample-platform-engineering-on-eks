<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribution Monitor</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-top: 10px;
        }

        .current-pod {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .current-pod h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .pod-info {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        .stats-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .stats-container h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .total-requests {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5em;
            font-weight: bold;
        }

        .pod-list {
            display: grid;
            gap: 20px;
        }

        .pod-item {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 15px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .pod-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }

        .pod-item.current {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border: 3px solid #667eea;
        }

        .pod-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .pod-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .pod-version {
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: bold;
            color: #667eea;
        }

        .request-count {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.5);
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 15px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .controls {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(245, 87, 108, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            margin-right: 15px;
        }

        .refresh-btn:hover {
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .pod-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Distribution Monitor</h1>
            <div class="version-badge">App Version: <span th:text="${currentVersion}"></span></div>
        </div>

        <div class="current-pod">
            <h2>📍 Current Response From</h2>
            <div class="pod-info">
                Pod: <span th:text="${currentPodId}"></span> | Version: <span th:text="${currentVersion}"></span>
            </div>
        </div>

        <div class="stats-container">
            <h2>📊 Load Distribution Statistics</h2>
            
            <div class="total-requests">
                Total Requests: <span th:text="${totalRequests}"></span>
            </div>

            <div class="pod-list" th:if="${!podCounts.isEmpty()}">
                <div class="pod-item" 
                     th:each="entry : ${podCounts}"
                     th:classappend="${entry.key == currentPodId + ':' + currentVersion} ? 'current' : ''">
                    <div class="pod-header">
                        <div class="pod-name" th:text="${#strings.substringBefore(entry.key, ':')}">Pod ID</div>
                        <div class="pod-version" th:text="'v' + ${#strings.substringAfter(entry.key, ':')}">Version</div>
                    </div>
                    <div class="request-count" th:text="${entry.value} + ' requests'">0 requests</div>
                    <div class="progress-bar">
                        <div class="progress-fill" 
                             th:style="'width: ' + ${entry.value * 100.0 / totalRequests} + '%'"
                             th:text="${#numbers.formatDecimal(entry.value * 100.0 / totalRequests, 1, 1)} + '%'">
                        </div>
                    </div>
                </div>
            </div>

            <div class="empty-state" th:if="${podCounts.isEmpty()}">
                No data yet. Refresh the page to start collecting load balancing data.
            </div>
        </div>

        <div class="controls">
            <form method="get" style="display: inline;">
                <button type="submit" class="btn refresh-btn">🔄 Refresh</button>
            </form>
            <form method="post" action="/clear" style="display: inline;">
                <button type="submit" class="btn">🗑️ Clear Data</button>
            </form>
        </div>
    </div>
</body>
</html>
